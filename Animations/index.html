<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        body {
            height: 90vh;
            /* full height of viewport */
            display: flex;
            justify-content: center;
            /* center horizontally */
            align-items: center;
            /* center vertically */
        }

        @keyframes moveandgrow {
            from {
                transform: translate(0, 0);
                background-color: aqua;
                width: 100px;
                height: 100px;
            }

            to {
                transform: translate(200px, 100px);
                background-color: brown;
                width: 200px;
                height: 200px;
            }
        }

        .animated-box {
            animation: moveandgrow 2s ease-in-out 1s infinite forwards alternate running;
        }
    </style>
</head>

<body>
    <div class="animated-box"></div>
</body>

</html>
